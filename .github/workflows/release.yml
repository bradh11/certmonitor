# Release workflow - creates GitHub releases from tags
# Note: PyPI publishing is handled by ci.yml workflow
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG.md
        id: extract-release-notes
        run: |
          # Extract version from tag (e.g. v0.3.0 -> 0.3.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # CHANGELOG.md uses the emoji-header format that matches GitHub
          # Releases directly. Extract everything between the version's
          # `## [X.Y.Z]` header and the next `## [` header. The awk
          # script captures the title line (# 📦 ...) through the end
          # of the section.
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          else
            echo "## Release $VERSION" > release_notes.md
            echo "" >> release_notes.md
            echo "See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for detailed changes." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.extract-release-notes.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          # Do NOT set generate_release_notes: true — CHANGELOG.md is
          # authoritative. Auto-generated commit notes would duplicate
          # the changelog content and break the formatting.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
